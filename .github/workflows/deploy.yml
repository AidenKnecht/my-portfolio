name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# id-token: write is required by actions/deploy-pages (OIDC auth)
# pages: write is required to push to the github-pages environment
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; never cancel an in-flight deploy
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          # Lets the action detect the correct base path for project pages
          # (e.g. /my-portfolio) vs user/org pages (empty string)
          static_site_generator: next

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # configure-pages emits the repo sub-path; next.config.js reads it
          # as basePath so all asset URLs are correct on project pages
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
